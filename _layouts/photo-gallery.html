---
layout: default
title: Photo Gallery
---

<center>
    {% assign sorted_gallery = site.photo_gallery | sort: 'weight' %}
    <ul class="photo-gallery">
            {% for image in sorted_gallery %}
            <img src="{{ image.image_path }}" alt="{{ image.title }}" style="height: 200px;" vspace=5, hspace=3>
            {% endfor %}
    </ul>
    {{content}}
</center>
